<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Maruti Education Hub - Attendance & Fees System</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  background:#f4f7fb;
  padding:20px;
}

.container{
  background:white;
  padding:20px;
  border-radius:16px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
  text-align:center;
  margin-bottom:20px;
  color:#1d4ed8;
}

.top-bar{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:15px;
}

input,
button{
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:14px;
}

input{
  flex:1;
  min-width:160px;
}

button{
  border:none;
  cursor:pointer;
  font-weight:bold;
  color:white;
}

.add-btn{
  background:#16a34a;
}

.present-btn{
  background:#059669;
}

.absent-btn{
  background:#dc2626;
}

.clear-btn{
  background:#ea580c;
}

.dark-btn{
  background:#7c3aed;
}

.export-btn{
  background:#2563eb;
}

.edit-btn{
  background:#f59e0b;
  padding:6px 10px;
}

.delete-btn{
  background:#dc2626;
  padding:6px 10px;
}

.table-wrap{
  overflow:auto;
  border:1px solid #ddd;
  border-radius:12px;
  max-height:80vh;
}

table{
  border-collapse:collapse;
  width:max-content;
  min-width:100%;
}

th, td{
  border:1px solid #d1d5db;
  padding:6px;
  text-align:center;
  min-width:35px;
  font-size:12px;
}

th{
  background:#111827;
  color:white;
  position:sticky;
  top:0;
  z-index:5;
}

/* Freeze Columns */

th:nth-child(1),
td:nth-child(1){
  position:sticky;
  left:0;
  z-index:4;
  background:white;
  min-width:40px;
}

th:nth-child(2),
td:nth-child(2){
  position:sticky;
  left:40px;
  z-index:4;
  background:white;
  min-width:110px;
}

th:nth-child(3),
td:nth-child(3){
  position:sticky;
  left:150px;
  z-index:4;
  background:white;
  min-width:180px;
}

th:nth-child(4),
td:nth-child(4){
  position:sticky;
  left:330px;
  z-index:4;
  background:white;
  min-width:120px;
}

th:nth-child(5),
td:nth-child(5){
  position:sticky;
  left:450px;
  z-index:4;
  background:white;
  min-width:110px;
}

.present{
  background:#d1fae5;
  cursor:pointer;
  font-weight:bold;
}

.absent{
  background:#fee2e2;
  cursor:pointer;
  font-weight:bold;
}

.empty{
  background:#f3f4f6;
  cursor:pointer;
}

.sunday{
  background:#ede9fe !important;
  color:#6d28d9;
}

.paid{
  background:#dcfce7;
  color:#166534;
  font-weight:bold;
  cursor:pointer;
}

.unpaid{
  background:#fee2e2;
  color:#991b1b;
  font-weight:bold;
  cursor:pointer;
}

.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:12px;
  margin-bottom:20px;
}

.card{
  background:#f8fafc;
  border-radius:12px;
  padding:15px;
}

.card h3{
  font-size:14px;
  margin-bottom:5px;
  color:#555;
}

.card p{
  font-size:24px;
  font-weight:bold;
}

/* Dark Mode */

.dark-mode{
  background:#111827;
  color:white;
}

.dark-mode .container{
  background:#1f2937;
}

.dark-mode td{
  background:#111827;
  color:white;
}

.dark-mode input{
  background:#374151;
  color:white;
  border:1px solid #555;
}

.dark-mode .card{
  background:#374151;
}

.dark-mode th:nth-child(1),
.dark-mode td:nth-child(1),
.dark-mode th:nth-child(2),
.dark-mode td:nth-child(2),
.dark-mode th:nth-child(3),
.dark-mode td:nth-child(3),
.dark-mode th:nth-child(4),
.dark-mode td:nth-child(4),
.dark-mode th:nth-child(5),
.dark-mode td:nth-child(5){
  background:#1f2937;
}

@media(max-width:768px){

  body{
    padding:10px;
  }

  th, td{
    font-size:10px;
    padding:4px;
  }

}

</style>
</head>

<body>

<div class="container">

<h1>📘 Maruti Education Hub</h1>

<div class="top-bar">

<input type="text" id="studentName" placeholder="Student Name">

<input type="text" id="studentMobile" placeholder="Mobile Number">

<input type="text" id="studentClass" placeholder="Class Name">

<input type="number" id="studentFees" placeholder="Monthly Fees">

<button class="add-btn" onclick="addStudent()">
➕ Add Student
</button>

</div>

<div class="top-bar">

<button class="present-btn" onclick="markAllPresent()">
✅ Full Present
</button>

<button class="absent-btn" onclick="markAllAbsent()">
❌ Full Absent
</button>

<button class="clear-btn" onclick="clearTodayAttendance()">
🗑 Clear Today
</button>

<button class="dark-btn" onclick="toggleDarkMode()">
🌙 Dark Mode
</button>

<button class="export-btn" onclick="exportCSV()">
📄 Export CSV
</button>

</div>

<div class="stats">

<div class="card">
<h3>Total Students</h3>
<p id="totalStudents">0</p>
</div>

<div class="card">
<h3>Total Fees</h3>
<p id="totalFees">₹0</p>
</div>

<div class="card">
<h3>Collected Fees</h3>
<p id="paidFees">₹0</p>
</div>

<div class="card">
<h3>Pending Fees</h3>
<p id="pendingFees">₹0</p>
</div>

</div>

<div class="table-wrap">
<table id="attendanceTable"></table>
</div>

</div>

<script>

let students =
JSON.parse(localStorage.getItem("students")) || [];

const table =
document.getElementById("attendanceTable");

const today = new Date();

const month = today.getMonth();

const year = today.getFullYear();

const dayToday = today.getDate();

const monthNames = [
"January","February","March",
"April","May","June",
"July","August","September",
"October","November","December"
];

const days =
new Date(year, month + 1, 0).getDate();

function save(){

localStorage.setItem(
"students",
JSON.stringify(students)
);

}

function attendanceKey(){

return `${year}-${month}`;

}

function addStudent(){

const name =
document.getElementById("studentName").value.trim();

const mobile =
document.getElementById("studentMobile").value.trim();

const cls =
document.getElementById("studentClass").value.trim();

const fees =
document.getElementById("studentFees").value;

if(!name || !mobile || !cls || !fees){

alert("Fill all fields");

return;
}

students.push({
name,
mobile,
cls,
fees:Number(fees),
feesPaid:false,
attendance:{}
});

save();

render();

document.getElementById("studentName").value="";
document.getElementById("studentMobile").value="";
document.getElementById("studentClass").value="";
document.getElementById("studentFees").value="";
}

function toggleAttendance(i,d){

let key = attendanceKey();

if(!students[i].attendance[key]){

students[i].attendance[key] = {};
}

let value =
students[i].attendance[key][d];

students[i].attendance[key][d] =
value === "P"
? "A"
: value === "A"
? ""
: "P";

save();

render();
}

function toggleFees(i){

students[i].feesPaid =
!students[i].feesPaid;

save();

render();
}

function editStudent(i){

let newName =
prompt("Edit Name", students[i].name);

let newMobile =
prompt("Edit Mobile", students[i].mobile);

let newClass =
prompt("Edit Class", students[i].cls);

let newFees =
prompt("Edit Fees", students[i].fees);

if(newName) students[i].name = newName;
if(newMobile) students[i].mobile = newMobile;
if(newClass) students[i].cls = newClass;
if(newFees) students[i].fees = Number(newFees);

save();

render();
}

function deleteStudent(i){

if(confirm("Delete this student?")){

students.splice(i,1);

save();

render();
}
}

function render(){

let key = attendanceKey();

let totalFees = 0;
let paidFees = 0;

document.getElementById("totalStudents").innerText =
students.length;

let html = `
<tr>
<th>#</th>
<th>Mobile</th>
<th>Name</th>
<th>Class</th>
<th>Fees</th>
`;

for(let d=1; d<=days; d++){

let date =
new Date(year,month,d);

let sunday =
date.getDay()===0;

html += `
<th class="${sunday ? 'sunday' : ''}">
${d}
</th>
`;
}

html += `
<th>P</th>
<th>A</th>
<th>%</th>
<th>Edit</th>
<th>Delete</th>
</tr>
`;

students.forEach((s,i)=>{

let p=0;
let a=0;

totalFees += s.fees;

if(s.feesPaid){

paidFees += s.fees;
}

html += `
<tr>

<td>${i+1}</td>

<td>${s.mobile}</td>

<td>${s.name}</td>

<td>${s.cls}</td>

<td
class="${s.feesPaid ? 'paid' : 'unpaid'}"
onclick="toggleFees(${i})"
>
₹${s.fees}
<br>
${s.feesPaid ? 'Paid' : 'Pending'}
</td>
`;

for(let d=1; d<=days; d++){

let value =
s.attendance[key]?.[d] || "";

if(value==="P") p++;

if(value==="A") a++;

let cls =
value==="P"
? "present"
: value==="A"
? "absent"
: "empty";

let date =
new Date(year,month,d);

let sunday =
date.getDay()===0;

html += `
<td
class="${sunday ? 'sunday' : cls}"
onclick="toggleAttendance(${i},${d})"
>
${value || "-"}
</td>
`;
}

let percent =
((p/days)*100).toFixed(0);

html += `
<td>${p}</td>
<td>${a}</td>
<td>${percent}%</td>

<td>
<button
class="edit-btn"
onclick="editStudent(${i})"
>
✏️
</button>
</td>

<td>
<button
class="delete-btn"
onclick="deleteStudent(${i})"
>
❌
</button>
</td>

</tr>
`;
});

if(students.length===0){

html += `
<tr>
<td colspan="${days+10}">
No Students Added
</td>
</tr>
`;
}

table.innerHTML = html;

document.getElementById("totalFees").innerText =
"₹" + totalFees;

document.getElementById("paidFees").innerText =
"₹" + paidFees;

document.getElementById("pendingFees").innerText =
"₹" + (totalFees - paidFees);
}

function markAllPresent(){

let key = attendanceKey();

students.forEach(s=>{

if(!s.attendance[key]){

s.attendance[key] = {};
}

s.attendance[key][dayToday] = "P";
});

save();

render();
}

function markAllAbsent(){

let key = attendanceKey();

students.forEach(s=>{

if(!s.attendance[key]){

s.attendance[key] = {};
}

s.attendance[key][dayToday] = "A";
});

save();

render();
}

function clearTodayAttendance(){

if(confirm("Clear today's attendance?")){

let key = attendanceKey();

students.forEach(student=>{

if(student.attendance[key]){

delete student.attendance[key][dayToday];
}
});

save();

render();
}
}

function exportCSV(){

let key = attendanceKey();

let csv = [];

let header = [
"No",
"Mobile",
"Name",
"Class",
"Fees",
"Fees Status"
];

for(let d=1; d<=days; d++){

header.push(`Day ${d}`);
}

header.push(
"Present",
"Absent",
"Percentage"
);

csv.push(header.join(","));

students.forEach((s,i)=>{

let p=0;
let a=0;

let row = [
i+1,
s.mobile,
s.name,
s.cls,
s.fees,
s.feesPaid ? "Paid" : "Pending"
];

for(let d=1; d<=days; d++){

let value =
s.attendance[key]?.[d] || "";

if(value==="P") p++;

if(value==="A") a++;

row.push(value || "-");
}

let percent =
((p/days)*100).toFixed(0);

row.push(p,a,percent+"%");

csv.push(row.join(","));
});

let blob = new Blob(
[csv.join("\n")],
{type:"text/csv"}
);

let link =
document.createElement("a");

link.href =
URL.createObjectURL(blob);

link.download =
"attendance_fees.csv";

link.click();
}

function toggleDarkMode(){

document.body.classList.toggle(
"dark-mode"
);

localStorage.setItem(
"darkMode",
document.body.classList.contains(
"dark-mode"
)
);
}

if(
localStorage.getItem("darkMode")
==="true"
){

document.body.classList.add(
"dark-mode"
);
}

render();

</script>

</body>
</html>
