<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Maruti Education Hub</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  background:#f4f7fb;
  padding:15px;
}

.container{
  background:white;
  padding:15px;
  border-radius:15px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
  text-align:center;
  margin-bottom:20px;
  color:#1d4ed8;
}

.top-bar{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:15px;
}

input,
select,
button{
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:14px;
}

input,
select{
  flex:1;
  min-width:160px;
}

button{
  border:none;
  cursor:pointer;
  font-weight:bold;
  color:white;
}

.add-btn{
  background:#16a34a;
}

.present-btn{
  background:#059669;
}

.absent-btn{
  background:#dc2626;
}

.clear-btn{
  background:#ea580c;
}

.export-btn{
  background:#2563eb;
}

.edit-btn{
  background:#f59e0b;
  padding:5px 8px;
}

.delete-btn{
  background:#dc2626;
  padding:5px 8px;
}

.table-wrap{
  overflow:auto;
  border:1px solid #ddd;
  border-radius:12px;
  max-height:80vh;
  -webkit-overflow-scrolling:touch;
}

table{
  border-collapse:collapse;
  width:max-content;
  min-width:100%;
}

th, td{
  border:1px solid #d1d5db;
  padding:5px;
  text-align:center;
  min-width:35px;
  font-size:12px;
}

th{
  background:#111827;
  color:white;
  position:sticky;
  top:0;
  z-index:5;
}

/* FREEZE COLUMNS */

th:nth-child(1),
td:nth-child(1){
  position:sticky;
  left:0;
  background:white;
  z-index:4;
  min-width:40px;
}

th:nth-child(2),
td:nth-child(2){
  position:sticky;
  left:40px;
  background:white;
  z-index:4;
  min-width:140px;
}

th:nth-child(3),
td:nth-child(3){
  position:sticky;
  left:180px;
  background:white;
  z-index:4;
  min-width:120px;
}

th:nth-child(4),
td:nth-child(4){
  position:sticky;
  left:300px;
  background:white;
  z-index:4;
  min-width:120px;
}

th:nth-child(5),
td:nth-child(5){
  position:sticky;
  left:420px;
  background:white;
  z-index:4;
  min-width:140px;
}

th:nth-child(6),
td:nth-child(6){
  position:sticky;
  left:560px;
  background:white;
  z-index:4;
  min-width:90px;
}

.present{
  background:#d1fae5;
  cursor:pointer;
  font-weight:bold;
}

.absent{
  background:#fee2e2;
  cursor:pointer;
  font-weight:bold;
}

.empty{
  background:#f3f4f6;
  cursor:pointer;
}

.sunday{
  background:#ede9fe !important;
  color:#6d28d9;
}

.paid{
  background:#dcfce7;
  color:#166534;
  font-weight:bold;
  cursor:pointer;
}

.unpaid{
  background:#fee2e2;
  color:#991b1b;
  font-weight:bold;
  cursor:pointer;
}

.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:12px;
  margin-bottom:20px;
}

.card{
  background:#f8fafc;
  border-radius:12px;
  padding:15px;
}

.card h3{
  font-size:14px;
  margin-bottom:5px;
  color:#555;
}

.card p{
  font-size:24px;
  font-weight:bold;
}

/* MOBILE RESPONSIVE */

@media(max-width:768px){

body{
  padding:5px;
}

.container{
  padding:8px;
  border-radius:10px;
}

h1{
  font-size:20px;
  margin-bottom:15px;
}

.top-bar{
  flex-direction:column;
  gap:8px;
}

.top-bar input,
.top-bar select,
.top-bar button{
  width:100%;
  min-width:100%;
  font-size:14px;
  padding:12px;
}

.stats{
  grid-template-columns:repeat(2,1fr);
  gap:8px;
}

.card{
  padding:10px;
}

.card h3{
  font-size:12px;
}

.card p{
  font-size:18px;
}

.table-wrap{
  overflow:auto;
  max-height:75vh;
  border-radius:10px;
}

table{
  min-width:1350px;
}

th,
td{
  font-size:10px;
  padding:4px;
  min-width:32px;
}

/* MOBILE FREEZE COLUMN WIDTH */

th:nth-child(1),
td:nth-child(1){
  min-width:35px;
}

th:nth-child(2),
td:nth-child(2){
  min-width:120px;
}

th:nth-child(3),
td:nth-child(3){
  min-width:100px;
}

th:nth-child(4),
td:nth-child(4){
  min-width:100px;
}

th:nth-child(5),
td:nth-child(5){
  min-width:110px;
}

th:nth-child(6),
td:nth-child(6){
  min-width:80px;
}

/* MOBILE LEFT POSITION */

th:nth-child(1),
td:nth-child(1){
  left:0;
}

th:nth-child(2),
td:nth-child(2){
  left:35px;
}

th:nth-child(3),
td:nth-child(3){
  left:155px;
}

th:nth-child(4),
td:nth-child(4){
  left:255px;
}

th:nth-child(5),
td:nth-child(5){
  left:355px;
}

th:nth-child(6),
td:nth-child(6){
  left:465px;
}

.edit-btn,
.delete-btn{
  padding:4px 6px;
  font-size:10px;
}

}

</style>
</head>

<body>

<div class="container">

<h1>📘 Maruti Education Hub</h1>

<!-- ADD STUDENT -->

<div class="top-bar">

<input type="text" id="studentName" placeholder="Student Name">

<input type="text" id="studentMobile" placeholder="Mobile Number">

<select id="studentClass">

<option value="">Select Branch</option>

<option value="Mota Varachha">Mota Varachha</option>

<option value="Mission Road">Mission Road</option>

<option value="Velanja">Velanja</option>

</select>

<select id="studentCourse">

<option value="">Select Course</option>

<option value="Spoken English">Spoken English</option>

<option value="IELTS">IELTS</option>

<option value="CCC">CCC</option>

<option value="Tally Prime">Tally Prime</option>

<option value="MS Office">MS Office</option>

<option value="Computer Basic">Computer Basic</option>

<option value="Web Design">Web Design</option>

<option value="Graphic Design">Graphic Design</option>

</select>

<input type="number" id="studentFees" placeholder="Fees">

<button class="add-btn" onclick="addStudent()">
➕ Add Student
</button>

</div>

<!-- FILTER -->

<div class="top-bar">

<select id="filterClass" onchange="render()">

<option value="All">All Branches</option>

<option value="Mota Varachha">Mota Varachha</option>

<option value="Mission Road">Mission Road</option>

<option value="Velanja">Velanja</option>

</select>

<select id="filterCourse" onchange="render()">

<option value="All">All Courses</option>

<option value="Spoken English">Spoken English</option>

<option value="IELTS">IELTS</option>

<option value="CCC">CCC</option>

<option value="Tally Prime">Tally Prime</option>

<option value="MS Office">MS Office</option>

<option value="Computer Basic">Computer Basic</option>

<option value="Web Design">Web Design</option>

<option value="Graphic Design">Graphic Design</option>

</select>

<button class="present-btn" onclick="markAllPresent()">
✅ Full Present
</button>

<button class="absent-btn" onclick="markAllAbsent()">
❌ Full Absent
</button>

<button class="clear-btn" onclick="clearTodayAttendance()">
🗑 Clear Today
</button>

<button class="export-btn" onclick="exportBackup()">
⬇ Export
</button>

<input
type="file"
id="importFile"
accept=".json"
style="display:none"
onchange="importBackup(event)"
>

<button
class="add-btn"
onclick="document.getElementById('importFile').click()"
>
⬆ Import
</button>

</div>

<!-- STATS -->

<div class="stats">

<div class="card">
<h3>Total Students</h3>
<p id="totalStudents">0</p>
</div>

<div class="card">
<h3>Total Fees</h3>
<p id="totalFees">₹0</p>
</div>

<div class="card">
<h3>Collected Fees</h3>
<p id="paidFees">₹0</p>
</div>

<div class="card">
<h3>Pending Fees</h3>
<p id="pendingFees">₹0</p>
</div>

</div>

<!-- TABLE -->

<div class="table-wrap">
<table id="attendanceTable"></table>
</div>

</div>

<script>

let students =
JSON.parse(localStorage.getItem("students")) || [];

const table =
document.getElementById("attendanceTable");

const today = new Date();

const month = today.getMonth();

const year = today.getFullYear();

const todayDay = today.getDate();

const days =
new Date(year, month + 1, 0).getDate();

function save(){

localStorage.setItem(
"students",
JSON.stringify(students)
);

}

function attendanceKey(){

return `${year}-${month}`;

}

function addStudent(){

const name =
document.getElementById("studentName").value.trim();

const mobile =
document.getElementById("studentMobile").value.trim();

const studentClass =
document.getElementById("studentClass").value;

const course =
document.getElementById("studentCourse").value;

const fees =
document.getElementById("studentFees").value;

if(!name || !mobile || !studentClass || !course || !fees){

alert("Fill all fields");

return;

}

students.push({

name:name,

mobile:mobile,

studentClass:studentClass,

course:course,

fees:Number(fees),

feesPaid:false,

attendance:{}

});

save();

render();

document.getElementById("studentName").value="";
document.getElementById("studentMobile").value="";
document.getElementById("studentClass").value="";
document.getElementById("studentCourse").value="";
document.getElementById("studentFees").value="";

}

function toggleAttendance(i,d){

let key = attendanceKey();

if(!students[i].attendance[key]){

students[i].attendance[key] = {};

}

let value =
students[i].attendance[key][d];

students[i].attendance[key][d] =
value === "P"
? "A"
: value === "A"
? ""
: "P";

save();

render();

}

function toggleFees(i){

students[i].feesPaid =
!students[i].feesPaid;

save();

render();

}

function editStudent(i){

let newName =
prompt("Edit Name", students[i].name);

let newMobile =
prompt("Edit Mobile", students[i].mobile);

let newBranch =
prompt("Edit Branch", students[i].studentClass);

let newCourse =
prompt("Edit Course", students[i].course);

let newFees =
prompt("Edit Fees", students[i].fees);

if(newName) students[i].name = newName;

if(newMobile) students[i].mobile = newMobile;

if(newBranch) students[i].studentClass = newBranch;

if(newCourse) students[i].course = newCourse;

if(newFees) students[i].fees = Number(newFees);

save();

render();

}

function deleteStudent(i){

if(confirm("Delete Student?")){

students.splice(i,1);

save();

render();

}

}

function render(){

let key = attendanceKey();

let totalFees = 0;

let paidFees = 0;

const filterClass =
document.getElementById("filterClass").value;

const filterCourse =
document.getElementById("filterCourse").value;

let filteredStudents =
students.filter(student => {

let classMatch =
filterClass === "All"
|| student.studentClass === filterClass;

let courseMatch =
filterCourse === "All"
|| student.course === filterCourse;

return classMatch && courseMatch;

});

document.getElementById("totalStudents").innerText =
filteredStudents.length;

let html = `
<tr>

<th>#</th>

<th>Name</th>

<th>Mobile</th>

<th>Branch</th>

<th>Course</th>

<th>Fees</th>
`;

for(let d=1; d<=days; d++){

let sunday =
new Date(year,month,d).getDay()===0;

html += `
<th class="${sunday ? 'sunday' : ''}">
${d}
</th>
`;

}

html += `
<th>P</th>
<th>A</th>
<th>%</th>
<th>Edit</th>
<th>Delete</th>
</tr>
`;

filteredStudents.forEach((s,index)=>{

let originalIndex =
students.indexOf(s);

let p=0;

let a=0;

totalFees += s.fees;

if(s.feesPaid){

paidFees += s.fees;

}

html += `
<tr>

<td>${index+1}</td>

<td>${s.name}</td>

<td>${s.mobile || "-"}</td>

<td>${s.studentClass}</td>

<td>${s.course}</td>

<td
class="${s.feesPaid ? 'paid' : 'unpaid'}"
onclick="toggleFees(${originalIndex})"
>

₹${s.fees}

<br>

${s.feesPaid ? 'Paid' : 'Pending'}

</td>
`;

for(let d=1; d<=days; d++){

let value =
s.attendance[key]?.[d] || "";

if(value==="P") p++;

if(value==="A") a++;

let cls =
value==="P"
? "present"
: value==="A"
? "absent"
: "empty";

let sunday =
new Date(year,month,d).getDay()===0;

html += `
<td
class="${sunday ? 'sunday' : cls}"
onclick="toggleAttendance(${originalIndex},${d})"
>

${value || "-"}

</td>
`;

}

let percent =
((p/days)*100).toFixed(0);

html += `
<td>${p}</td>

<td>${a}</td>

<td>${percent}%</td>

<td>

<button
class="edit-btn"
onclick="editStudent(${originalIndex})"
>
✏️
</button>

</td>

<td>

<button
class="delete-btn"
onclick="deleteStudent(${originalIndex})"
>
❌
</button>

</td>

</tr>
`;

});

table.innerHTML = html;

document.getElementById("totalFees").innerText =
"₹" + totalFees;

document.getElementById("paidFees").innerText =
"₹" + paidFees;

document.getElementById("pendingFees").innerText =
"₹" + (totalFees - paidFees);

}

function markAllPresent(){

let key = attendanceKey();

students.forEach(student => {

if(!student.attendance[key]){

student.attendance[key] = {};

}

student.attendance[key][todayDay] = "P";

});

save();

render();

}

function markAllAbsent(){

let key = attendanceKey();

students.forEach(student => {

if(!student.attendance[key]){

student.attendance[key] = {};

}

student.attendance[key][todayDay] = "A";

});

save();

render();

}

function clearTodayAttendance(){

if(confirm("Clear today's attendance?")){

let key = attendanceKey();

students.forEach(student => {

if(student.attendance[key]){

delete student.attendance[key][todayDay];

}

});

save();

render();

}

}

/* EXPORT BACKUP */

function exportBackup(){

const backupData = {

students: students

};

const blob = new Blob(
[JSON.stringify(backupData,null,2)],
{type:"application/json"}
);

const link =
document.createElement("a");

link.href =
URL.createObjectURL(blob);

link.download =
"attendance_backup.json";

link.click();

}

/* IMPORT BACKUP */

function importBackup(event){

const file = event.target.files[0];

if(!file) return;

const reader = new FileReader();

reader.onload = function(e){

try{

const data =
JSON.parse(e.target.result);

if(data.students){

students = data.students;

save();

render();

alert("Backup Imported Successfully");

}else{

alert("Invalid Backup File");

}

}catch(error){

alert("Import Failed");

}

};

reader.readAsText(file);

}

render();

</script>

</body>
</html>
