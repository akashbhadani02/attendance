<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Maruti Education Hub - Attendance System</title>

<style>
* { box-sizing: border-box; }

body {
  font-family: Arial, sans-serif;
  background: #f4f7fb;
  margin: 0;
  padding: 20px;
  color: #222;
}

.container {
  max-width: 100%;
  margin: auto;
  background: #fff;
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.08);
}

.header {
  text-align: center;
  margin-bottom: 20px;
}

.header h1 {
  margin: 0;
  font-size: 28px;
  color: #1d4ed8;
}

.header p {
  margin: 6px 0 0;
  color: #555;
  font-size: 14px;
}

.section-title {
  font-size: 20px;
  margin: 20px 0 10px;
  color: #111827;
}

.top-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 15px;
}

input, select, button, textarea {
  padding: 10px 12px;
  border-radius: 10px;
  border: 1px solid #d1d5db;
  font-size: 14px;
  outline: none;
}

button {
  border: none;
  cursor: pointer;
  font-weight: bold;
}

.add-btn { background: #16a34a; color: white; }
.print-btn { background: #2563eb; color: white; }
.present-btn { background: #059669; color: white; }
.absent-btn { background: #dc2626; color: white; }
.clear-btn { background: #7c3aed; color: white; }

.table-wrap {
  overflow: auto;
  border: 1px solid #ddd;
  border-radius: 12px;
  max-height: 75vh;
}

table {
  width: max-content;
  min-width: 100%;
  border-collapse: collapse;
}

th, td {
  border: 1px solid #d1d5db;
  padding: 7px;
  text-align: center;
  font-size: 12px;
}

th {
  background: #111827;
  color: white;
  position: sticky;
  top: 0;
}

.present {
  background: #d1fae5;
  cursor: pointer;
}

.absent {
  background: #fee2e2;
  cursor: pointer;
}

.empty {
  background: #f3f4f6;
  cursor: pointer;
}

.sunday {
  background: #ffe4e6 !important;
  color: red;
}

.action-btn {
  padding: 5px 8px;
  border-radius: 6px;
  color: white;
  border: none;
}

.edit-btn { background: orange; }
.delete-btn { background: red; }

@media print {
  .top-bar,
  .action-col {
    display: none !important;
  }

  body {
    background: white;
    padding: 0;
  }

  .container {
    box-shadow: none;
    padding: 0;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <h1>📘 Maruti Education Hub</h1>
    <p>Attendance Management System</p>
  </div>

  <h2 class="section-title">➕ Add Student</h2>

  <div class="top-bar">
    <input id="studentName" placeholder="Student Name">
    <input id="rollNumber" placeholder="Mobile Number">
    <input id="className" placeholder="Class Name">
    <button class="add-btn" onclick="addStudent()">Add Student</button>
  </div>

  <div class="top-bar">
    <select id="monthSelect"></select>
    <select id="yearSelect"></select>

    <select id="classFilter">
      <option value="All">All Classes</option>
    </select>

    <input id="mainSearch" placeholder="Search Student">

    <button class="print-btn" onclick="window.print()">🖨 Print</button>

    <!-- EASY ATTENDANCE -->
    <button class="present-btn" onclick="markAllPresent()">✅ All Present</button>

    <button class="absent-btn" onclick="markAllAbsent()">❌ All Absent</button>

    <button class="clear-btn" onclick="clearTodayAttendance()">🧹 Clear Today</button>
  </div>

  <div class="table-wrap">
    <table id="attendanceTable"></table>
  </div>

</div>

<script>

let students = JSON.parse(localStorage.getItem("attendanceData")) || [];

const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

let today = new Date();

const studentName = document.getElementById("studentName");
const rollNumber = document.getElementById("rollNumber");
const className = document.getElementById("className");

const monthSelect = document.getElementById("monthSelect");
const yearSelect = document.getElementById("yearSelect");

const classFilter = document.getElementById("classFilter");
const mainSearch = document.getElementById("mainSearch");

const attendanceTable = document.getElementById("attendanceTable");

// MONTH
months.forEach((m, i) => {
  let o = document.createElement("option");
  o.value = i;
  o.text = m;

  if (i === today.getMonth()) {
    o.selected = true;
  }

  monthSelect.appendChild(o);
});

// YEAR
for (let y = today.getFullYear()-2; y <= today.getFullYear()+2; y++) {

  let o = document.createElement("option");

  o.value = y;
  o.text = y;

  if (y === today.getFullYear()) {
    o.selected = true;
  }

  yearSelect.appendChild(o);
}

function save() {
  localStorage.setItem("attendanceData", JSON.stringify(students));
}

function daysInMonth(m, y) {
  return new Date(y, m + 1, 0).getDate();
}

function key() {
  return yearSelect.value + "-" + monthSelect.value;
}

// ADD STUDENT
function addStudent() {

  let name = studentName.value.trim();
  let roll = rollNumber.value.trim();
  let cls = className.value.trim();

  if (!name || !roll || !cls) {
    alert("Enter all details");
    return;
  }

  students.push({
    name,
    roll,
    className: cls,
    attendance: {}
  });

  studentName.value = "";
  rollNumber.value = "";
  className.value = "";

  save();
  updateClassFilter();
  render();
}

// UPDATE CLASS FILTER
function updateClassFilter() {

  const current = classFilter.value;

  const classes = [...new Set(students.map(s => s.className))];

  classFilter.innerHTML = `<option value="All">All Classes</option>`;

  classes.forEach(cls => {

    let o = document.createElement("option");

    o.value = cls;
    o.text = cls;

    classFilter.appendChild(o);
  });

  classFilter.value = current || "All";
}

// FILTERED STUDENTS
function getFilteredStudents() {

  const selectedClass = classFilter.value;
  const search = mainSearch.value.toLowerCase();

  return students
    .map((s, index) => ({...s, originalIndex:index}))
    .filter(s => selectedClass === "All" || s.className === selectedClass)
    .filter(s =>
      s.name.toLowerCase().includes(search) ||
      s.roll.toLowerCase().includes(search) ||
      s.className.toLowerCase().includes(search)
    );
}

// TOGGLE
function toggle(i, d) {

  const actualIndex = getFilteredStudents()[i].originalIndex;

  const k = key();

  if (!students[actualIndex].attendance[k]) {
    students[actualIndex].attendance[k] = {};
  }

  let v = students[actualIndex].attendance[k][d];

  students[actualIndex].attendance[k][d] =
    v === "P" ? "A" :
    v === "A" ? "" : "P";

  save();
  render();
}

// ALL PRESENT
function markAllPresent() {

  const filteredStudents = getFilteredStudents();

  const todayDay = new Date().getDate();

  const k = key();

  filteredStudents.forEach(student => {

    const actualIndex = student.originalIndex;

    if (!students[actualIndex].attendance[k]) {
      students[actualIndex].attendance[k] = {};
    }

    students[actualIndex].attendance[k][todayDay] = "P";
  });

  save();
  render();
}

// ALL ABSENT
function markAllAbsent() {

  const filteredStudents = getFilteredStudents();

  const todayDay = new Date().getDate();

  const k = key();

  filteredStudents.forEach(student => {

    const actualIndex = student.originalIndex;

    if (!students[actualIndex].attendance[k]) {
      students[actualIndex].attendance[k] = {};
    }

    students[actualIndex].attendance[k][todayDay] = "A";
  });

  save();
  render();
}

// CLEAR TODAY
function clearTodayAttendance() {

  const filteredStudents = getFilteredStudents();

  const todayDay = new Date().getDate();

  const k = key();

  filteredStudents.forEach(student => {

    const actualIndex = student.originalIndex;

    if (students[actualIndex].attendance[k]) {
      students[actualIndex].attendance[k][todayDay] = "";
    }
  });

  save();
  render();
}

// EDIT
function editStudent(i) {

  const actualIndex = getFilteredStudents()[i].originalIndex;

  let name = prompt("Edit Name", students[actualIndex].name);

  let roll = prompt("Edit Mobile", students[actualIndex].roll);

  let cls = prompt("Edit Class", students[actualIndex].className);

  if (name) students[actualIndex].name = name;
  if (roll) students[actualIndex].roll = roll;
  if (cls) students[actualIndex].className = cls;

  save();
  updateClassFilter();
  render();
}

// DELETE
function deleteStudent(i) {

  const actualIndex = getFilteredStudents()[i].originalIndex;

  if (confirm("Delete Student?")) {

    students.splice(actualIndex, 1);

    save();
    updateClassFilter();
    render();
  }
}

// RENDER
function render() {

  let m = +monthSelect.value;
  let y = +yearSelect.value;

  let days = daysInMonth(m, y);

  let k = key();

  let filteredStudents = getFilteredStudents();

  let html = `
  <tr>
    <th>#</th>
    <th>Mobile</th>
    <th>Name</th>
    <th>Class</th>
  `;

  for (let d = 1; d <= days; d++) {

    let dt = new Date(y, m, d);

    let day = dt.toLocaleDateString("en-US", {weekday:"short"});

    let sun = dt.getDay() === 0;

    html += `
    <th class="${sun ? 'sunday' : ''}">
      ${d}<br>${day}
    </th>`;
  }

  html += `
    <th>P</th>
    <th>A</th>
    <th class="action-col">Action</th>
  </tr>`;

  filteredStudents.forEach((s, i) => {

    let p = 0;
    let a = 0;

    html += `
    <tr>
      <td>${i+1}</td>
      <td>${s.roll}</td>
      <td>${s.name}</td>
      <td>${s.className}</td>
    `;

    for (let d = 1; d <= days; d++) {

      let v = s.attendance[k]?.[d] || "";

      if (v === "P") p++;
      if (v === "A") a++;

      let cls =
        v === "P" ? "present" :
        v === "A" ? "absent" : "empty";

      html += `
      <td class="${cls}" onclick="toggle(${i},${d})">
        ${v || "-"}
      </td>`;
    }

    html += `
      <td>${p}</td>
      <td>${a}</td>

      <td class="action-col">

        <button class="action-btn edit-btn"
        onclick="editStudent(${i})">
        ✏️
        </button>

        <button class="action-btn delete-btn"
        onclick="deleteStudent(${i})">
        ❌
        </button>

      </td>
    </tr>`;
  });

  attendanceTable.innerHTML = html;
}

// EVENTS
monthSelect.onchange = render;
yearSelect.onchange = render;
classFilter.onchange = render;
mainSearch.oninput = render;

updateClassFilter();
render();

</script>

</body>
</html>
